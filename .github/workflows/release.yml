name: Release & Docker Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-and-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install -r requirements.txt

      - name: Test bot startup
        if: runner.os == 'Linux'
        timeout-minutes: 2
        env:
          DISCORD_TOKEN: ${{ secrets.TEST_DISCORD_TOKEN || 'test-token' }}
          DEEPL_API_KEY: ${{ secrets.TEST_DEEPL_API_KEY || 'test-key' }}
        run: |
          timeout 30s python Files/AT_bot.py --docker --config=test 2>&1 | head -50 || true
          echo "[SUCCESS] Boot test completed"

      - name: Build release archive
        shell: bash
        run: |
          python - <<'PY'
          import os, platform, shutil, pathlib

          root = pathlib.Path(".").resolve()
          dist = root / "dist"
          stage = root / "stage"
          shutil.rmtree(dist, ignore_errors=True)
          shutil.rmtree(stage, ignore_errors=True)
          dist.mkdir(parents=True, exist_ok=True)
          stage.mkdir(parents=True, exist_ok=True)

          keep = [
              "Files",
              "README.md",
              "LICENSE.md",
              "StartBot.sh",
              "Start bot.bat",
              "requirements.txt",
              "updater.py",
          ]

          for item in keep:
              p = root / item
              if p.exists():
                  if p.is_dir():
                      shutil.copytree(p, stage / p.name, dirs_exist_ok=True)
                  else:
                      shutil.copy2(p, stage / p.name)

          ref = os.environ.get("GITHUB_REF_NAME", "dev")
          os_name = platform.system().lower()
          release_name = f"AT-bot-{ref}-{os_name}"

          if os_name == "windows":
              out = shutil.make_archive(str(dist / release_name), "zip", root_dir=stage)
          else:
              out = shutil.make_archive(str(dist / release_name), "gztar", root_dir=stage)

          print(f"Created: {out}")
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ runner.os }}
          path: dist/*

  publish-release:
    needs: test-and-build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*

