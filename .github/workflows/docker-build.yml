name: Docker Build & Push

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  check-credentials:
    runs-on: ubuntu-latest
    outputs:
      has-docker-creds: ${{ steps.check.outputs.has_docker }}
    steps:
      - name: Check Docker Hub credentials
        id: check
        run: |
          if [[ -n "${{ secrets.DOCKER_USERNAME }}" && -n "${{ secrets.DOCKER_TOKEN }}" ]]; then
            echo "has_docker=true" >> $GITHUB_OUTPUT
          else
            echo "has_docker=false" >> $GITHUB_OUTPUT
          fi

  docker-build-push:
    needs: check-credentials
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: needs.check-credentials.outputs.has-docker-creds == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image tags
        id: tags
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          DOCKER_TAGS="ghcr.io/${REPO_LOWER}:latest"
          
          if [[ -n "${{ secrets.DOCKER_USERNAME }}" ]]; then
            DOCKER_TAGS="${DOCKER_TAGS},${{ secrets.DOCKER_USERNAME }}/atbot:latest"
          fi
          
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            DOCKER_TAGS="${DOCKER_TAGS},ghcr.io/${REPO_LOWER}:${TAG_NAME}"
            if [[ -n "${{ secrets.DOCKER_USERNAME }}" ]]; then
              DOCKER_TAGS="${DOCKER_TAGS},${{ secrets.DOCKER_USERNAME }}/atbot:${TAG_NAME}"
            fi
          fi
          
          echo "tags=${DOCKER_TAGS}" >> $GITHUB_OUTPUT

      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
